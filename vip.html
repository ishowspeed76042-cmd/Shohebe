<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACANZA ELITE | Premium Directory</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           ACANZA ELITE DESIGN SYSTEM V4.0 (ULTRA HEAVY NEO-DARK)
           ========================================================================== */
        :root {
            /* Core Backgrounds */
            --bg-deep: #030608;
            --bg-darker: #010304;
            --panel-hex: #0a1118;
            --panel-light: #121e29;
            --panel-hover: #162432;
            
            /* Text Colors */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-dark: #334155;
            
            /* Elite Accent Colors */
            --gold-glow: #ffd700;
            --gold-dark: #ccaa00;
            --blue-neon: #00f2ff;
            --verified-blue: #34b7f1;
            --danger-red: #ff3b30;
            --success-green: #00a884;
            --primary-purple: #8b5cf6;
            
            /* Social Brand Colors */
            --ig-color: #e1306c;
            --yt-color: #ff0000;
            --tg-color: #0088cc;
            --wa-brand: #25D366;
            --x-color: #ffffff;
            --fb-color: #1877F2;
            --snap-color: #FFFC00;

            /* Glassmorphism Variables */
            --glass-bg: rgba(10, 17, 24, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            
            /* Transitions */
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ==========================================================================
           GLOBAL RESETS & TYPOGRAPHY
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevent body scroll, let container scroll */
            position: relative;
        }

        /* Hardware Accelerated Background Gradient */
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(13,33,54,0.4) 0%, var(--bg-deep) 60%);
            z-index: -3;
            animation: pulseAmbient 15s infinite alternate linear;
            pointer-events: none;
        }

        @keyframes pulseAmbient {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(2%, 2%); }
        }

        /* Canvas for Particle System */
        #particle-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            pointer-events: none;
            opacity: 0.6;
        }

        /* ==========================================================================
           LOADER SCREEN (DIAMOND SHINE)
           ========================================================================== */
        #loader-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-darker);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        .diamond-loader {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--gold-glow), var(--gold-dark));
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            animation: pulseDiamond 1.5s infinite, spinDiamond 4s linear infinite;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
            position: relative;
        }
        
        .diamond-loader::after {
            content: ''; position: absolute; inset: 5px;
            background: var(--bg-darker);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }

        @keyframes pulseDiamond {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.3) rotate(180deg); }
        }
        @keyframes spinDiamond {
            100% { filter: hue-rotate(360deg); }
        }

        .loader-text {
            margin-top: 40px;
            font-family: 'Orbitron', sans-serif;
            color: var(--gold-glow);
            letter-spacing: 5px;
            font-size: 15px;
            text-transform: uppercase;
            animation: blinkText 1.5s infinite;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        @keyframes blinkText { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ==========================================================================
           MAIN APP CONTAINER
           ========================================================================== */
        #main-app {
            display: none; 
            height: 100vh;
            width: 100%;
            flex-direction: column;
            animation: appFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 10;
        }

        @keyframes appFadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* ==========================================================================
           PREMIUM HEADER
           ========================================================================== */
        header {
            background: rgba(5, 10, 14, 0.85);
            padding: 25px 20px 20px;
            text-align: center;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            position: relative;
        }

        /* Glowing Top Line */
        header::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-glow), transparent);
        }

        .back-trigger {
            position: absolute;
            left: 25px;
            top: 30px;
            color: var(--gold-glow);
            font-size: 22px;
            cursor: pointer;
            opacity: 0.8;
            transition: var(--transition-fast);
            padding: 5px;
        }
        .back-trigger:hover { opacity: 1; transform: scale(1.1) translateX(-3px); }

        .crown-icon {
            font-size: 38px;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8));
            animation: floatCrown 3s ease-in-out infinite;
        }
        @keyframes floatCrown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 6px;
            color: transparent;
            background: linear-gradient(to right, #ffd700, #ff8c00, #ffd700);
            -webkit-background-clip: text;
            background-size: 200% auto;
            animation: shineText 3s linear infinite;
            text-transform: uppercase;
        }
        @keyframes shineText { to { background-position: 200% center; } }

        .header-subtitle {
            color: var(--blue-neon);
            font-size: 12px;
            margin-top: 8px;
            letter-spacing: 3px;
            font-weight: 600;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .logout-trigger {
            position: absolute;
            right: 25px;
            top: 30px;
            color: var(--danger-red);
            font-size: 20px;
            cursor: pointer;
            opacity: 0.7;
            transition: var(--transition-fast);
            padding: 5px;
        }
        .logout-trigger:hover { opacity: 1; transform: scale(1.1) rotate(90deg); }

        /* ==========================================================================
           ADVANCED SEARCH & FILTER SYSTEM
           ========================================================================== */
        .search-container {
            padding: 20px;
            background: linear-gradient(180deg, rgba(5,10,14,0.9) 0%, transparent 100%);
            z-index: 90;
        }

        .search-wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 600px;
            margin: 0 auto;
        }

        #search-input {
            width: 100%;
            padding: 16px 20px 16px 55px;
            background: rgba(18, 30, 41, 0.7);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 16px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        #search-input:focus {
            border-color: var(--gold-glow);
            background: rgba(18, 30, 41, 0.9);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            transform: translateY(-2px);
        }
        #search-input::placeholder { color: rgba(148, 163, 184, 0.5); }

        .search-wrapper .fa-search {
            position: absolute;
            left: 22px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold-glow);
            font-size: 18px;
            opacity: 0.8;
            transition: var(--transition-fast);
        }
        #search-input:focus ~ .fa-search { opacity: 1; transform: translateY(-50%) scale(1.1); }

        /* Filter Pills */
        .filter-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            max-width: 600px;
            margin-left: auto; margin-right: auto;
        }
        .filter-pill {
            padding: 6px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition-fast);
            font-weight: 600;
            letter-spacing: 1px;
        }
        .filter-pill.active {
            background: rgba(255, 215, 0, 0.15);
            border-color: var(--gold-glow);
            color: var(--gold-glow);
        }
        .filter-pill:hover:not(.active) { background: rgba(255,255,255,0.1); color: white; }

        /* ==========================================================================
           ELITE LIST RENDER AREA
           ========================================================================== */
        #main-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 20px 40px;
            scroll-behavior: smooth;
        }
        
        /* Custom Scrollbar for Container */
        #main-container::-webkit-scrollbar { width: 6px; }
        #main-container::-webkit-scrollbar-track { background: transparent; }
        #main-container::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.2); border-radius: 10px; }
        #main-container::-webkit-scrollbar-thumb:hover { background: rgba(255,215,0,0.5); }

        .list-wrapper {
            max-width: 650px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Section Dividers in List */
        .list-divider {
            width: 100%;
            text-align: center;
            margin: 20px 0 10px;
            position: relative;
        }
        .list-divider::before {
            content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px;
            background: rgba(255,255,255,0.1); z-index: 1;
        }
        .list-divider span {
            background: var(--bg-deep);
            padding: 0 15px;
            color: var(--text-muted);
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            position: relative;
            z-index: 2;
        }

        /* ==========================================================================
           USER CARD DESIGN (PRO MAX LEVEL)
           ========================================================================== */
        .elite-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 18px;
            position: relative;
            transition: var(--transition-smooth);
            cursor: pointer;
            overflow: hidden; 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            animation: cardEnter 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .elite-card:hover {
            transform: translateY(-5px) scale(1.01);
            background: var(--panel-hover);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .elite-card:active { transform: scale(0.98); }

        .elite-card.hidden { display: none !important; }

        /* --- THE ULTIMATE VIP FRIEND CARD STYLE --- */
        .card-top-vip {
            background: linear-gradient(135deg, rgba(20, 15, 0, 0.8) 0%, rgba(30, 25, 5, 0.9) 100%);
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.15);
        }
        .card-top-vip:hover {
            border-color: var(--gold-glow);
            box-shadow: 0 12px 40px rgba(255, 215, 0, 0.3);
            background: linear-gradient(135deg, rgba(30, 25, 0, 0.9) 0%, rgba(40, 35, 10, 1) 100%);
        }

        /* Gold Sweep Shine Animation for VIPs */
        .vip-shine::after {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 215, 0, 0.2), transparent);
            transform: skewX(-25deg);
            animation: sweepShine 4s infinite cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        @keyframes sweepShine { 0% { left: -100%; } 20%, 100% { left: 200%; } }

        /* Friend Badge indicator */
        .friend-indicator {
            position: absolute;
            top: 0; right: 0;
            background: var(--success-green);
            color: white;
            font-size: 9px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            padding: 3px 10px;
            border-bottom-left-radius: 12px;
            letter-spacing: 1px;
            box-shadow: -2px 2px 10px rgba(0, 168, 132, 0.4);
            z-index: 10;
        }
        .friend-indicator.vip-friend-tag {
            background: linear-gradient(90deg, #ff8c00, #ffd700);
            color: #000;
            box-shadow: -2px 2px 15px rgba(255, 215, 0, 0.6);
        }

        /* --- AVATAR ENGINE --- */
        .avatar-engine { position: relative; width: 70px; height: 70px; flex-shrink: 0; }

        .avatar-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #1a262f;
            position: relative; z-index: 5;
            background: #000;
        }

        .vip-ring {
            position: absolute;
            top: -6px; left: -6px; right: -6px; bottom: -6px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--verified-blue);
            border-bottom-color: var(--gold-glow);
            animation: spinRingCard 3s linear infinite;
            z-index: 1;
        }
        @keyframes spinRingCard { 100% { transform: rotate(360deg); } }

        /* --- INFO BLOCK --- */
        .info-block { 
            flex: 1; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }

        .user-name {
            font-size: 19px;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.3s;
        }
        .card-top-vip .user-name { color: var(--gold-glow); text-shadow: 0 0 5px rgba(255,215,0,0.3); }

        .verified-tick { color: var(--verified-blue); font-size: 15px; filter: drop-shadow(0 0 4px rgba(52, 183, 241, 0.5)); }
        .card-top-vip .verified-tick { color: var(--gold-glow); filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.8)); }

        .uid-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            color: var(--text-muted);
            opacity: 0.8;
            margin-top: 3px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .card-top-vip .uid-label { color: rgba(255, 215, 0, 0.6); }

        /* --- SOCIAL & CUSTOM ROW INJECTORS --- */
        .badges-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .social-row, .custom-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        /* Tiny Social Orbs */
        .s-badge {
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }
        .elite-card:hover .s-badge { transform: scale(1.1); }
        
        .bg-ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .bg-yt { background: var(--yt-color); }
        .bg-tg { background: var(--tg-color); }
        .bg-wa { background: var(--wa-brand); }
        .bg-x { background: #000; border: 1px solid #444; }
        .bg-fb { background: var(--fb-color); }
        .bg-snap { background: var(--snap-color); color: #000; }

        /* Custom Smart Badges (Web/Phone) */
        .c-badge {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 6px;
            color: #fff;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
            max-width: 150px;
        }
        .c-badge span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .c-phone { color: var(--success-green); border-color: rgba(0, 168, 132, 0.3); }
        .c-web { color: var(--blue-neon); border-color: rgba(0, 242, 255, 0.3); }

        /* Right Side Icons */
        .action-zone {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            z-index: 10;
        }

        .crown-indicator {
            color: var(--gold-glow);
            font-size: 20px;
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.6));
        }

        .arrow-icon {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            transition: var(--transition-smooth);
        }
        .elite-card:hover .arrow-icon {
            background: var(--blue-neon);
            color: #000;
            transform: translateX(4px);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
        }
        .card-top-vip:hover .arrow-icon {
            background: var(--gold-glow);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        /* --- EMPTY STATE --- */
        .empty-state {
            text-align: center; color: var(--text-muted); margin-top: 80px;
            display: flex; flex-direction: column; align-items: center;
            animation: fadeIn 0.5s ease;
        }
        .empty-state i { font-size: 50px; margin-bottom: 15px; opacity: 0.5; }
        .empty-state h3 { font-family: 'Orbitron', sans-serif; color: white; letter-spacing: 2px; }
        .empty-state p { font-size: 14px; margin-top: 5px; }

    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="loader-screen">
        <div class="diamond-loader"></div>
        <div class="loader-text" id="loader-msg">VERIFYING SESSION...</div>
    </div>

    <div id="main-app">
        
        <header>
            <i class="fas fa-arrow-left back-trigger" onclick="window.location.href='index.html'" title="Return Home"></i>
            <i class="fas fa-power-off logout-trigger" id="logout-btn" title="Secure Logout"></i>
            <div class="crown-icon">👑</div>
            <h1>ACANZA DIRECTORY</h1>
            <p class="header-subtitle" id="my-name-tag">Accessing Neural Link...</p>
        </header>

        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="Search users by name, id, or phone...">
                <i class="fas fa-search"></i>
            </div>
            <div class="filter-container">
                <div class="filter-pill active" data-filter="all">ALL USERS</div>
                <div class="filter-pill" data-filter="vip">VIP ONLY</div>
                <div class="filter-pill" data-filter="friends">MY FRIENDS</div>
            </div>
        </div>

        <div id="main-container">
            <div class="list-wrapper" id="elite-list-anchor">
                </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ==========================================================================
        // FIREBASE CONFIGURATION
        // ==========================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAYX1lrxHre2bYKzZfOMM3WWwIKHPySI9I",
            authDomain: "chat-81c0c.firebaseapp.com",
            databaseURL: "https://chat-81c0c-default-rtdb.firebaseio.com",
            projectId: "chat-81c0c",
            appId: "1:852591586864:web:db877a72adbb742d5287f5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // System Globals
        let currentUID = null;
        let currentUser = null;
        let myFriendsList = new Set();
        let masterUserList = []; // Array to hold all processed user objects

        // ==========================================================================
        // PARTICLE PHYSICS BACKGROUND SYSTEM
        // ==========================================================================
        function initParticles() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particlesArray = [];
            const numberOfParticles = 50; // Optimized for mobile

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2;
                    this.speedX = Math.random() * 0.5 - 0.25;
                    this.speedY = Math.random() * 0.5 - 0.25;
                    this.color = `rgba(255, 215, 0, ${Math.random() * 0.3})`;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
                }
                draw() {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particlesArray.length; i++) {
                    particlesArray[i].update();
                    particlesArray[i].draw();
                }
                requestAnimationFrame(animate);
            }
            animate();

            // Handle Resize
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // ==========================================================================
        // AUTHENTICATION & SECURITY GATE
        // ==========================================================================
        onAuthStateChanged(auth, async (user) => {
            const loaderMsg = document.getElementById('loader-msg');
            
            if (user) {
                currentUID = user.uid;
                loaderMsg.innerText = "AUTHENTICATING IDENTITY...";
                
                try {
                    const snap = await get(ref(db, 'userMapping/' + currentUID));
                    if (snap.exists()) {
                        currentUser = snap.val();
                        initAppSequence();
                    } else {
                        // User exists in auth but no profile mapped -> Setup needed
                        window.location.href = 'index.html';
                    }
                } catch(e) {
                    console.error("Database Access Denied:", e);
                    window.location.href = 'index.html';
                }
            } else {
                // Not logged in -> Kick out immediately
                window.location.href = 'index.html';
            }
        });

        // ==========================================================================
        // INITIALIZE APPLICATION DATA FETCHING
        // ==========================================================================
        async function initAppSequence() {
            // Start Background FX
            initParticles();

            document.getElementById('my-name-tag').innerText = `IDENTIFIED: @${currentUser.toUpperCase()}`;
            document.getElementById('loader-msg').innerText = "DOWNLOADING NEURAL DATA...";

            // 1. Fetch current user's friend list to know who gets priority
            const friendSnap = await get(ref(db, `friends/${currentUser}`));
            if (friendSnap.exists()) {
                const friendsData = friendSnap.val();
                Object.keys(friendsData).forEach(fKey => {
                    if (friendsData[fKey] === true) myFriendsList.add(fKey.toLowerCase());
                });
            }

            // 2. Setup Live Listener for All Users
            listenToEcosystem();
        }

        function listenToEcosystem() {
            const listAnchor = document.getElementById('elite-list-anchor');

            onValue(ref(db, '/'), (snapshot) => {
                // Fade out loader smoothly
                const loader = document.getElementById('loader-screen');
                loader.style.opacity = '0';
                setTimeout(() => { 
                    loader.style.display = 'none'; 
                    document.getElementById('main-app').style.display = 'flex';
                }, 500);

                if (!snapshot.exists()) {
                    renderEmptyState("DATABASE EMPTY", "No citizens found in the ACANZA ecosystem.");
                    return;
                }

                const data = snapshot.val();
                const mappings = data.userMapping || {};
                const users = data.users || {};
                const metas = data.users_meta || {};

                masterUserList = []; // Reset list

                // Process every mapped user
                Object.keys(mappings).forEach(uid => {
                    const uname = mappings[uid];
                    if (!uname) return; // Skip invalid
                    
                    // Don't show the logged-in user in their own directory
                    if (uname.toLowerCase() === currentUser.toLowerCase()) return;

                    const profile = users[uname] || {};
                    const meta = metas[uid] || {};
                    
                    // Complex VIP Logic Verification
                    let isVIP = false;
                    if (meta.membership && meta.membership.active === true) {
                        if (!meta.membership.expiry || Date.now() < meta.membership.expiry) {
                            isVIP = true;
                        }
                    }

                    // Check if they are in my friend list
                    const isFriend = myFriendsList.has(uname.toLowerCase());

                    // Build standardized user object for sorting
                    masterUserList.push({
                        uid: uid,
                        username: uname,
                        profile: profile,
                        isVIP: isVIP,
                        isFriend: isFriend,
                        // Convert to lowercase for search indexing
                        searchIndex: `${uname.toLowerCase()} ${uid.toLowerCase()}` 
                    });
                });

                // ==========================================================
                // THE MASTER SORTING ALGORITHM
                // Priority 1: VIP Friends
                // Priority 2: Other VIPs
                // Priority 3: Normal Friends
                // Priority 4: Normal Users
                // ==========================================================
                masterUserList.sort((a, b) => {
                    const aVipFriend = a.isVIP && a.isFriend;
                    const bVipFriend = b.isVIP && b.isFriend;
                    
                    if (aVipFriend && !bVipFriend) return -1;
                    if (!aVipFriend && bVipFriend) return 1;

                    if (a.isVIP && !b.isVIP) return -1;
                    if (!a.isVIP && b.isVIP) return 1;

                    if (a.isFriend && !b.isFriend) return -1;
                    if (!a.isFriend && b.isFriend) return 1;

                    // Fallback to alphabetical sorting
                    return a.username.localeCompare(b.username);
                });

                // Render the sorted list
                renderList(masterUserList);
            });
        }

        // ==========================================================================
        // RENDER ENGINE
        // ==========================================================================
        function renderList(userArray) {
            const list = document.getElementById('elite-list-anchor');
            list.innerHTML = ""; // Clear existing

            if (userArray.length === 0) {
                renderEmptyState("NO USERS FOUND", "Try adjusting your filters or search terms.");
                return;
            }

            // Track sections for dividers
            let currentSection = "";

            userArray.forEach((u, index) => {
                
                // Determine Section Category for visual dividers
                let itemCategory = "";
                if (u.isVIP && u.isFriend) itemCategory = "ELITE CIRCLE (VIP FRIENDS)";
                else if (u.isVIP) itemCategory = "PREMIUM MEMBERS";
                else if (u.isFriend) itemCategory = "MY CONTACTS";
                else itemCategory = "GLOBAL CITIZENS";

                // Add divider if category changes
                if (itemCategory !== currentSection) {
                    currentSection = itemCategory;
                    const divider = document.createElement('div');
                    divider.className = 'list-divider';
                    divider.innerHTML = `<span>${currentSection}</span>`;
                    list.appendChild(divider);
                }

                // Construct Card Data
                const pfp = u.profile.profilePic;
                const defaultImg = `https://ui-avatars.com/api/?name=${u.username}&background=0a1118&color=ffd700&bold=true`;
                
                // --- LINE 1: SOCIAL PLATFORMS ---
                let socialsHTML = '';
                if (u.profile.socials) {
                    const s = u.profile.socials;
                    if(s.instagram) socialsHTML += `<div class="s-badge bg-ig"><i class="fab fa-instagram"></i></div>`;
                    if(s.youtube) socialsHTML += `<div class="s-badge bg-yt"><i class="fab fa-youtube"></i></div>`;
                    if(s.x) socialsHTML += `<div class="s-badge bg-x"><i class="fa-brands fa-x-twitter"></i></div>`;
                    if(s.facebook) socialsHTML += `<div class="s-badge bg-fb"><i class="fab fa-facebook-f"></i></div>`;
                    if(s.snapchat) socialsHTML += `<div class="s-badge bg-snap"><i class="fab fa-snapchat-ghost"></i></div>`;
                    if(s.telegram) socialsHTML += `<div class="s-badge bg-tg"><i class="fab fa-telegram-plane"></i></div>`;
                    if(s.whatsapp) socialsHTML += `<div class="s-badge bg-wa"><i class="fab fa-whatsapp"></i></div>`;
                }

                // --- LINE 2: SMART CUSTOM CONNECTIONS (With ERROR FIX) ---
                let customHTML = '';
                if (u.profile.customLinks) {
                    Object.values(u.profile.customLinks).forEach(link => {
                        // FIX: Safely check if url exists and convert to string before regex
                        if (link && link.url) {
                            let urlStr = String(link.url).trim();
                            // Check if it's purely numbers, spaces, or + sign
                            let isNumber = /^[\+\d\s]+$/.test(urlStr);
                            
                            let icon = isNumber ? '<i class="fas fa-phone-alt"></i>' : '<i class="fas fa-globe"></i>';
                            let colorClass = isNumber ? 'c-phone' : 'c-web';
                            let title = link.title || (isNumber ? 'Phone' : 'Web');
                            
                            customHTML += `<div class="c-badge ${colorClass}">${icon} <span>${title}</span></div>`;
                            
                            // Append to search index so user can search by phone number
                            u.searchIndex += ` ${urlStr}`;
                        }
                    });
                }

                // Determine CSS Classes
                let cardClasses = 'elite-card';
                let ringHTML = '';
                let crownHTML = '';
                let friendTagHTML = '';
                let verifiedHTML = '';

                // Apply VIP Styles
                if (u.isVIP) {
                    cardClasses += ' vip-shine';
                    ringHTML = '<div class="vip-ring"></div>';
                    crownHTML = '<i class="fas fa-crown crown-indicator"></i>';
                    verifiedHTML = '<i class="fas fa-check-circle verified-tick"></i>';
                }

                // Apply Friend Styles (Top Tier visual upgrade)
                if (u.isVIP && u.isFriend) {
                    cardClasses += ' card-top-vip';
                    friendTagHTML = '<div class="friend-indicator vip-friend-tag"><i class="fas fa-star"></i> VIP FRIEND</div>';
                } else if (u.isFriend) {
                    friendTagHTML = '<div class="friend-indicator"><i class="fas fa-user-check"></i> FRIEND</div>';
                }

                // Create Element
                const card = document.createElement('div');
                card.className = cardClasses;
                
                // Data attributes for Search & Filter
                card.setAttribute('data-search', u.searchIndex);
                card.setAttribute('data-vip', u.isVIP ? 'true' : 'false');
                card.setAttribute('data-friend', u.isFriend ? 'true' : 'false');
                
                // Click Redirect to profile.html
                card.onclick = () => { window.location.href = `profile.html?user=${encodeURIComponent(u.username)}`; };
                
                // Animation delay for cascading effect
                card.style.animationDelay = `${index * 0.05}s`;
                
                card.innerHTML = `
                    ${friendTagHTML}
                    <div class="avatar-engine">
                        ${ringHTML}
                        <img src="${pfp || defaultImg}" class="avatar-img" onerror="this.src='${defaultImg}'">
                    </div>
                    
                    <div class="info-block">
                        <div class="user-name">
                            ${u.username} ${verifiedHTML}
                        </div>
                        <div class="uid-label">ID: ${u.uid.substring(0, 12).toUpperCase()}</div>
                        
                        ${socialsHTML ? `<div class="badges-wrapper"><div class="social-row">${socialsHTML}</div></div>` : ''}
                        ${customHTML ? `<div class="badges-wrapper" style="margin-top:2px;"><div class="custom-row">${customHTML}</div></div>` : ''}
                    </div>
                    
                    <div class="action-zone">
                        ${crownHTML}
                        <div class="arrow-icon"><i class="fas fa-chevron-right"></i></div>
                    </div>
                `;
                
                list.appendChild(card);
            });
        }

        function renderEmptyState(title, desc) {
            const list = document.getElementById('elite-list-anchor');
            list.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-satellite-dish"></i>
                    <h3>${title}</h3>
                    <p>${desc}</p>
                </div>
            `;
        }

        // ==========================================================================
        // SEARCH & FILTER LOGIC
        // ==========================================================================
        const searchInput = document.getElementById('search-input');
        const filterPills = document.querySelectorAll('.filter-pill');
        let currentFilter = 'all';

        // Filter Click Handler
        filterPills.forEach(pill => {
            pill.addEventListener('click', (e) => {
                // Update UI
                filterPills.forEach(p => p.classList.remove('active'));
                e.target.classList.add('active');
                
                // Set state and execute filter
                currentFilter = e.target.getAttribute('data-filter');
                executeSearchAndFilter();
            });
        });

        // Search Type Handler
        searchInput.addEventListener('input', executeSearchAndFilter);

        function executeSearchAndFilter() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.elite-card');
            const dividers = document.querySelectorAll('.list-divider');
            let visibleCount = 0;

            // Hide dividers during search/filter for cleaner look, or keep them if u want
            dividers.forEach(div => div.style.display = (searchTerm === '' && currentFilter === 'all') ? 'block' : 'none');

            cards.forEach(card => {
                const searchData = card.getAttribute('data-search');
                const isVIP = card.getAttribute('data-vip') === 'true';
                const isFriend = card.getAttribute('data-friend') === 'true';
                
                let matchesSearch = searchData.includes(searchTerm);
                let matchesFilter = true;

                if (currentFilter === 'vip' && !isVIP) matchesFilter = false;
                if (currentFilter === 'friends' && !isFriend) matchesFilter = false;

                if (matchesSearch && matchesFilter) {
                    card.classList.remove('hidden');
                    visibleCount++;
                } else {
                    card.classList.add('hidden');
                }
            });

            // Handle No Results
            const list = document.getElementById('elite-list-anchor');
            const existingEmpty = list.querySelector('.empty-state');
            
            if (visibleCount === 0) {
                if (!existingEmpty) {
                    const empty = document.createElement('div');
                    empty.className = 'empty-state';
                    empty.innerHTML = `
                        <i class="fas fa-ghost"></i>
                        <h3>NO MATCHES</h3>
                        <p>No users fit your current search criteria.</p>
                    `;
                    list.appendChild(empty);
                }
            } else if (existingEmpty) {
                existingEmpty.remove();
            }
        }

        // ==========================================================================
        // SYSTEM ACTIONS
        // ==========================================================================
        document.getElementById('logout-btn').onclick = () => {
            if(confirm("Are you sure you want to securely disconnect from ACANZA?")) {
                signOut(auth).then(() => {
                    window.location.href = 'index.html';
                });
            }
        };
    </script>
</body>
