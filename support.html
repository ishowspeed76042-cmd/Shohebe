<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect with Shoheb | Social Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --whatsapp: #25d366;
            --instagram: #e1306c;
            --youtube: #ff0000;
            --admin-gold: #fcc419;
            --bg-dark: #060b13;
            --card-glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Tech Background */
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a2a3a 0%, #060b13 100%);
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            text-align: center;
            z-index: 10;
        }

        /* Profile Header */
        .profile-section {
            margin-bottom: 30px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            padding: 5px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: white;
            text-transform: uppercase;
        }

        .status {
            font-size: 0.8rem;
            color: var(--primary);
            opacity: 0.8;
            margin-top: 5px;
            display: block;
        }

        /* Social Links List */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            background: var(--card-glass);
            border: 1px solid var(--border-glass);
            padding: 15px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            transform: translateX(10px);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
        }

        .link-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .link-info i {
            font-size: 1.5rem;
            width: 30px;
            text-align: center;
        }

        .link-text {
            text-align: left;
        }

        .link-text h3 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .link-text p {
            font-size: 0.7rem;
            opacity: 0.6;
        }

        .arrow {
            font-size: 0.8rem;
            opacity: 0.4;
        }

        /* Color Variations */
        .whatsapp:hover { border-color: var(--whatsapp); color: var(--whatsapp); }
        .instagram:hover { border-color: var(--instagram); color: var(--instagram); }
        .youtube:hover { border-color: var(--youtube); color: var(--youtube); }
        .phone:hover { border-color: var(--secondary); color: var(--secondary); }
        
        /* Admin Card Special Styling */
        .admin-card {
            border: 1px solid rgba(252, 196, 25, 0.3);
            background: linear-gradient(90deg, rgba(252, 196, 25, 0.05), transparent);
        }
        .admin-card:hover {
            border-color: var(--admin-gold);
            color: var(--admin-gold);
            box-shadow: 0 0 15px rgba(252, 196, 25, 0.2);
        }

        footer {
            margin-top: 40px;
            font-size: 0.7rem;
            opacity: 0.4;
            letter-spacing: 1px;
        }

        /* Float Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .profile-section { animation: float 4s ease-in-out infinite; }

    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <div class="container">
        <div class="profile-section">
            <img src="https://i.ibb.co/whkpLCFn/your-image-name.jpg" alt="Shoheb" class="profile-img">
            <h1>Shoheb</h1>
            <span class="status">Full Stack Developer & Game Creator</span>
        </div>

        <div class="social-links">
            
            <div class="link-card admin-card">
                <div class="link-info">
                    <i class="fas fa-shield-halved"></i>
                    <div class="link-text">
                        <h3>ACANZA ADMIN</h3>
                        <p>Official System Administrator</p>
                    </div>
                </div>
                <i class="fas fa-crown" style="font-size: 0.8rem; color: var(--admin-gold);"></i>
            </div>

            <a href="tel:+917558720286" class="link-card phone">
                <div class="link-info">
                    <i class="fas fa-phone-alt"></i>
                    <div class="link-text">
                        <h3>Contact Number</h3>
                        <p>+91 75587 20286</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://wa.me/917558720286" target="_blank" class="link-card whatsapp">
                <div class="link-info">
                    <i class="fab fa-whatsapp"></i>
                    <div class="link-text">
                        <h3>WhatsApp</h3>
                        <p>Message for business queries</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://www.instagram.com/shoheb_.007?igsh=cXBydTJoems3NHdr" target="_blank" class="link-card instagram">
                <div class="link-info">
                    <i class="fab fa-instagram"></i>
                    <div class="link-text">
                        <h3>Instagram</h3>
                        <p>Follow @shoheb_.007</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://youtube.com/@s-project-s?si=jMoHyhlACfkzwBoI" target="_blank" class="link-card youtube">
                <div class="link-info">
                    <i class="fab fa-youtube"></i>
                    <div class="link-text">
                        <h3>YouTube</h3>
                        <p>Official Tech Channel</p>
                    </div>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

        </div>

        <footer>
            SHOHEB DIGITAL HUB © 2026
        </footer>
    </div>

</body>
</html>
